name: Validate application

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: mewsik-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check, test, and build
    runs-on: windows-2025
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.11.0
          run_install: false

      - name: Install the pinned Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install the pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ./src-tauri -> target

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify manifests and generated types
        run: |
          pnpm version:check
          pnpm check

      - name: Verify discovery publisher contract
        run: |
          pnpm test:discovery-snapshot
          pnpm test:release-policy

      - name: Build the production frontend and sidecar
        run: pnpm build

      - name: Verify Rust formatting and behavior
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run browser end-to-end tests
        run: pnpm exec playwright test --workers=4
