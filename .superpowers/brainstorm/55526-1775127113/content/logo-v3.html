<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mewsik Logo v3</title>
<style>
  body { background: #0a0a0a; margin: 0; padding: 2rem; font-family: -apple-system, sans-serif; color: #f5f5f5; }
  h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
  .preview { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
  .preview .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.1em; }
  .app-icon { border-radius: 22%; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .sidebar-mock { background: #101010; border-radius: 12px; padding: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .sidebar-mock .name { font-size: 1.1rem; font-weight: 700; color: #fff; }
  .row { display: flex; gap: 3rem; align-items: flex-end; justify-content: center; flex-wrap: wrap; margin-bottom: 2.5rem; }
</style>
</head>
<body>

<h2>Mewsik Logo v3 — Refined</h2>
<p class="subtitle">Ears grow from the head as one continuous shape. Cat smile (W-shaped mouth). No overlaps.</p>

<div class="row">
  <div class="preview">
    <div class="label">App Icon 128px</div>
    <div class="app-icon">
      <svg width="128" height="128" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="110" fill="#111111"/>
        <!-- Single continuous head + ears path — no overlaps -->
        <path
          d="M140 320
             C140 320 138 180 160 140
             L130 72
             L200 150
             C220 130 238 120 256 120
             C274 120 292 130 312 150
             L382 72
             L352 140
             C374 180 372 320 372 320
             C372 400 320 440 256 440
             C192 440 140 400 140 320Z"
          stroke="#4ade80"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
        <!-- Eyes -->
        <circle cx="210" cy="272" r="14" fill="#4ade80"/>
        <circle cx="302" cy="272" r="14" fill="#4ade80"/>
        <!-- Nose dot -->
        <circle cx="256" cy="312" r="6" fill="#4ade80"/>
        <!-- Cat smile (W-shape / two curves meeting at nose) -->
        <path d="M228 330 Q242 348 256 330 Q270 348 284 330" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- Whiskers — extend well past face -->
        <line x1="212" y1="316" x2="80" y2="296" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="212" y1="332" x2="80" y2="344" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="316" x2="432" y2="296" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="332" x2="432" y2="344" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="preview">
    <div class="label">64px</div>
    <div class="app-icon">
      <svg width="64" height="64" viewBox="0 0 512 512" fill="none">
        <rect width="512" height="512" rx="110" fill="#111"/>
        <path d="M140 320 C140 320 138 180 160 140 L130 72 L200 150 C220 130 238 120 256 120 C274 120 292 130 312 150 L382 72 L352 140 C374 180 372 320 372 320 C372 400 320 440 256 440 C192 440 140 400 140 320Z" stroke="#4ade80" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="210" cy="272" r="14" fill="#4ade80"/>
        <circle cx="302" cy="272" r="14" fill="#4ade80"/>
        <circle cx="256" cy="312" r="6" fill="#4ade80"/>
        <path d="M228 330 Q242 348 256 330 Q270 348 284 330" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="212" y1="316" x2="80" y2="296" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="212" y1="332" x2="80" y2="344" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="316" x2="432" y2="296" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="332" x2="432" y2="344" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="preview">
    <div class="label">32px</div>
    <div class="app-icon">
      <svg width="32" height="32" viewBox="0 0 512 512" fill="none">
        <rect width="512" height="512" rx="110" fill="#111"/>
        <path d="M140 320 C140 320 138 180 160 140 L130 72 L200 150 C220 130 238 120 256 120 C274 120 292 130 312 150 L382 72 L352 140 C374 180 372 320 372 320 C372 400 320 440 256 440 C192 440 140 400 140 320Z" stroke="#4ade80" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="210" cy="272" r="14" fill="#4ade80"/>
        <circle cx="302" cy="272" r="14" fill="#4ade80"/>
        <circle cx="256" cy="312" r="6" fill="#4ade80"/>
        <path d="M228 330 Q242 348 256 330 Q270 348 284 330" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="212" y1="316" x2="80" y2="296" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="212" y1="332" x2="80" y2="344" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="316" x2="432" y2="296" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="332" x2="432" y2="344" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div class="row">
  <div class="preview">
    <div class="label">Sidebar</div>
    <div class="sidebar-mock">
      <svg width="28" height="28" viewBox="0 0 512 512" fill="none" style="color:#4ade80;">
        <path d="M140 320 C140 320 138 180 160 140 L130 72 L200 150 C220 130 238 120 256 120 C274 120 292 130 312 150 L382 72 L352 140 C374 180 372 320 372 320 C372 400 320 440 256 440 C192 440 140 400 140 320Z" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="210" cy="272" r="14" fill="currentColor"/>
        <circle cx="302" cy="272" r="14" fill="currentColor"/>
        <circle cx="256" cy="312" r="6" fill="currentColor"/>
        <path d="M228 330 Q242 348 256 330 Q270 348 284 330" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="212" y1="316" x2="80" y2="296" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <line x1="212" y1="332" x2="80" y2="344" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="316" x2="432" y2="296" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
        <line x1="300" y1="332" x2="432" y2="344" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
      </svg>
      <span class="name">mewsik</span>
    </div>
  </div>
</div>

<p style="text-align:center;color:#666;font-size:0.85rem;">One continuous path for head + ears. W-shaped cat mouth. Nose dot. Long whiskers. No overlapping strokes.</p>

</body>
</html>
